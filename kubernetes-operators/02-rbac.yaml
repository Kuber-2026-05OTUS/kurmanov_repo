apiVersion: v1
kind: ServiceAccount
metadata:
  name: mysql-operator
  namespace: default

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mysql-operator
rules:
  # Управление самим ресурсом CRD
  - apiGroups: ["otus.homework"]
    resources: ["mysqls", "mysqls/status"]
    verbs: ["get", "list", "watch", "patch", "update"]

  # Создание и удаление Deployment (оператор разворачивает mysql)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "delete"]

  # Создание и удаление ресурсов типа Service, PV, PVC
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims", "persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "delete"]

  # Чтобы kopf мог писать события о работе оператора
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mysql-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mysql-operator
subjects:
  - kind: ServiceAccount
    name: mysql-operator
    namespace: default