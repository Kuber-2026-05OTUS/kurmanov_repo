apiVersion: v1
kind: ServiceAccount
metadata:
  name: cd
  namespace: homework

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cd-sa-binding
  namespace: homework
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - kind: ServiceAccount
    name: cd
    namespace: homework