# Helmfile: описание двух релизов kafka (prod и dev) из bitnami helm-чарта

repositories:
  - name: bitnami
    url: https://charts.bitnami.com/bitnami

releases:
  # Релиз prod: namespace prod, 5 брокеров, kafka 3.5.2, SASL_PLAINTEXT
  - name: kafka-prod
    namespace: prod
    createNamespace: true
    chart: bitnami/kafka
    version: 25.3.5            # линейка kafka 3.5.x (3.5.2 задаётся через image.tag)
    values:
      - values/kafka-prod.yaml

  # Релиз dev: namespace dev, 1 брокер, последняя версия kafka, PLAINTEXT, auth off
  - name: kafka-dev
    namespace: dev
    createNamespace: true
    chart: bitnami/kafka
    # version не указываем → используется последняя доступная версия чарта
    values:
      - values/kafka-dev.yaml
