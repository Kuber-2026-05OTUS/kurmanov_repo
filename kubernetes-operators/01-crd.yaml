apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mysqls.otus.homework
spec:
  group: otus.homework
  scope: Namespaced
  names:
    kind: MySQL
    plural: mysqls
    singular: mysql
    shortNames: [ms]
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}          # kopf хранит в данном месте прогресс обработки
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [image, database, password, storage_size]
              properties:
                image:
                  type: string
                  pattern: '^[a-zA-Z0-9./_:-]+$'
                database:
                  type: string
                  minLength: 1
                password:
                  type: string
                  minLength: 4
                storage_size:
                  type: string
                  pattern: '^[0-9]+(Mi|Gi)$'
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true   # сюда kopf пишет свой прогресс
  